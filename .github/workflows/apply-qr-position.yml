          ABQAAAAIABwR4lzu1h/ZqAQAAMcLAAAKAAAAAAAAAAAAAAC2gddpAABzb2JyZS5odG1sUEsBAhQA
          FAAAAAgAHBHiXPbI/dyBBAAAewsAAAsAAAAAAAAAAAAAALaBp24AAHRlcm1vcy5odG1sUEsFBgAA
          AAAYABgArQYAAFFzAAAAAA==
          '''.split())
          pathlib.Path('site-update.zip').write_bytes(base64.b64decode(data))
      - name: Apply files
        shell: python
        run: |
          import pathlib
          import subprocess
          import zipfile

          raw = subprocess.check_output(['git', 'ls-files', '-z'])
          for path in raw.decode('utf-8', 'surrogateescape').split('\0'):
              if path and '\\' in path:
                  subprocess.run(['git', 'rm', '--', path], check=True)

          with zipfile.ZipFile('site-update.zip') as archive:
              archive.extractall('.')
          pathlib.Path('site-update.zip').unlink(missing_ok=True)
      - name: Commit changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm --ignore-unmatch -- '.github/workflows/apply-qr-position.yml'
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Move and enlarge support QR"
          git push
